kind = "web"
previewPath = "/"
title = "Meta2"
version = "1.0.0"
id = "artifacts/meta2-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19532

[services.development]
run = "pnpm --filter @workspace/meta2-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meta2-app", "run", "build" ]
publicDir = "artifacts/meta2-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19532"
BASE_PATH = "/"
